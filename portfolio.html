<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title id="page-title">Portfolio — Folio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,300&family=IBM+Plex+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&family=Unbounded:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;transition:background .5s,color .5s;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ── LAYOUT ─────────────────────────────────────────────────────── */
#app-layout{display:flex;min-height:100vh}

/* LEFT — portfolio view */
#portfolio-view{
  flex:1;
  overflow-y:auto;
  height:100vh;
  position:relative;
  transition:filter .4s;
}

/* RIGHT — theme panel */
#theme-panel{
  width:260px;
  flex-shrink:0;
  height:100vh;
  overflow-y:auto;
  background:#0a0a12;
  border-left:1px solid rgba(255,255,255,0.07);
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
}

.tp-header{
  padding:20px 16px 14px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  flex-shrink:0;
}
.tp-title{
  font-family:'Syne',sans-serif;
  font-size:0.82rem;
  font-weight:700;
  color:#6c63ff;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:4px;
}
.tp-sub{font-size:0.7rem;color:rgba(255,255,255,0.25)}

.tp-list{
  flex:1;
  overflow-y:auto;
  padding:10px 10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.tp-list::-webkit-scrollbar{width:4px}
.tp-list::-webkit-scrollbar-track{background:transparent}
.tp-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

/* Theme row */
.tr{
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .2s;
  flex-shrink:0;
}
.tr:hover{border-color:rgba(255,255,255,0.2);transform:translateX(-2px)}
.tr.active{border-color:#6c63ff;box-shadow:0 0 16px rgba(108,99,255,0.3)}

.tr-preview{
  height:90px;
  position:relative;
  overflow:hidden;
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.tr-prev-content{flex:1}
.tr-prev-name{
  font-size:13px;
  font-weight:700;
  margin-bottom:6px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tr-prev-bar{height:2px;border-radius:1px;margin-bottom:6px;opacity:0.8}
.tr-prev-tags{display:flex;gap:4px;flex-wrap:wrap}
.tr-prev-tag{
  font-size:9px;
  padding:2px 6px;
  border-radius:3px;
  font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.tr-prev-icons{
  display:flex;
  gap:6px;
  opacity:0.5;
  font-size:10px;
  margin-top:4px;
}

.tr-meta{
  padding:8px 12px 10px;
  background:#0f0f1a;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.tr-name{font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;color:#e0e0ff}
.tr-cat{font-size:0.62rem;color:rgba(224,224,255,0.3)}
.tr-select{
  background:rgba(108,99,255,0.2);
  border:1px solid rgba(108,99,255,0.3);
  color:#a090ff;
  font-size:0.65rem;
  font-weight:600;
  padding:4px 10px;
  border-radius:20px;
  cursor:pointer;
  transition:all .2s;
  font-family:'DM Sans',sans-serif;
}
.tr.active .tr-select{background:#6c63ff;color:#fff;border-color:#6c63ff}
.tr-select:hover{background:#6c63ff;color:#fff}

/* TOP BAR */
#topbar{
  position:fixed;top:16px;right:276px;
  display:flex;gap:8px;z-index:9999;
}
.tpill{
  background:rgba(8,8,12,.85);border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(12px);color:#fff;padding:8px 16px;border-radius:100px;
  font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;display:flex;align-items:center;gap:6px;
}
.tpill:hover{background:rgba(120,100,255,.3)}

/* TOAST */
#toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  padding:10px 22px;border-radius:12px;font-size:.85rem;z-index:99999;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
  background:#111;color:#fff;border:1px solid #333;
  font-family:'DM Sans',sans-serif;
}
#toast.show{opacity:1}

/* ── SOCIAL BUTTONS ─────────────────────────────────────────────── */
.s-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.s-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:100px;font-size:.8rem;font-weight:600;transition:transform .15s,opacity .15s}
.s-btn:hover{transform:translateY(-2px);opacity:.85}
.s-btn.li{background:#0077b5;color:#fff}
.s-btn.gh{background:#24292e;color:#fff}
.s-btn.ig{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);color:#fff}
.s-btn.wa{background:#25d366;color:#fff}

/* ── FLOATING SECTION ICONS ─────────────────────────────────────── */
.section-wrap{position:relative}
.float-icon{
  position:absolute;
  left:-60px;
  top:50%;
  transform:translateY(-50%);
  width:42px;height:42px;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;
  background:rgba(108,99,255,0.12);
  border:1px solid rgba(108,99,255,0.2);
  opacity:0;
  transition:opacity .4s, transform .4s;
  pointer-events:none;
}
.section-wrap.visible .float-icon{
  opacity:1;
  animation:floatBob 3s ease-in-out infinite;
}
@keyframes floatBob{
  0%,100%{transform:translateY(-50%) translateY(0)}
  50%{transform:translateY(-50%) translateY(-6px)}
}

/* ── FADE UP ANIMATIONS ─────────────────────────────────────────── */
.fade-up{opacity:0;transform:translateY(30px);transition:opacity .6s ease, transform .6s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
.fade-up:nth-child(1){transition-delay:.05s}
.fade-up:nth-child(2){transition-delay:.12s}
.fade-up:nth-child(3){transition-delay:.18s}
.fade-up:nth-child(4){transition-delay:.24s}
.fade-up:nth-child(5){transition-delay:.3s}

/* ── THEME TRANSITION OVERLAY ───────────────────────────────────── */
#theme-transition{
  position:fixed;inset:0;background:#0a0a10;
  z-index:8888;opacity:0;pointer-events:none;
  transition:opacity .25s;
}
#theme-transition.flash{opacity:1;pointer-events:all}

/* shared section shell */
.section{padding:72px max(40px,8vw);max-width:1040px;margin:0 auto}

/* ════════════════════════════════════════════════════════════════════
   THEME 1 — CYBER
════════════════════════════════════════════════════════════════════ */
body.cyber{background:#050a10;color:#cdf0ea;font-family:'IBM Plex Mono',monospace}
.cyber .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 40px;position:relative;overflow:hidden;background:linear-gradient(180deg,#050a10,#071520)}
.cyber .hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,204,.04) 1px,transparent 1px);background-size:60px 60px}
.cyber .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00ffcc,transparent)}
.cyber .h-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,14vw,10rem);letter-spacing:6px;background:linear-gradient(135deg,#00ffcc,#7b2fff,#00ffcc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(0,255,204,.3));line-height:.9;margin-bottom:12px}
.cyber .h-title{font-size:.8rem;letter-spacing:5px;text-transform:uppercase;color:#00ffcc;margin-bottom:20px}
.cyber .h-summary{max-width:560px;color:rgba(205,240,234,.6);line-height:1.7;font-size:.9rem}
.cyber .h-contact{margin-top:12px;color:rgba(123,47,255,.8);font-size:.78rem;letter-spacing:2px}
.cyber .sec-label{font-size:.7rem;letter-spacing:5px;text-transform:uppercase;color:#00ffcc;margin-bottom:28px;display:flex;align-items:center;gap:14px}
.cyber .sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(0,255,204,.4),transparent)}
.cyber .card{background:rgba(0,255,204,.03);border:1px solid rgba(0,255,204,.08);border-radius:8px;padding:18px 22px;margin-bottom:10px;transition:all .2s}
.cyber .card:hover{border-color:rgba(0,255,204,.25);background:rgba(0,255,204,.06)}
.cyber .c-title{font-weight:700;color:#cdf0ea;margin-bottom:4px}
.cyber .c-sub{color:#00ffcc;font-size:.8rem;margin-bottom:6px}
.cyber .c-desc{color:rgba(205,240,234,.55);font-size:.88rem;white-space:pre-line;line-height:1.6}
.cyber .tag{background:rgba(123,47,255,.15);color:#c084fc;border:1px solid rgba(123,47,255,.25);padding:4px 12px;border-radius:4px;font-size:.75rem;display:inline-block;margin:3px}
.cyber .float-icon{background:rgba(0,255,204,0.1);border-color:rgba(0,255,204,0.25)}

/* ════════════════════════════════════════════════════════════════════
   THEME 2 — NOIR
════════════════════════════════════════════════════════════════════ */
body.noir{background:#080808;color:#e8e8e8;font-family:'Outfit',sans-serif}
.noir .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;background:#080808}
.noir .hero-l{padding:80px 60px;display:flex;flex-direction:column;justify-content:flex-end;border-right:1px solid #1a1a1a}
.noir .hero-r{padding:80px 60px;display:flex;flex-direction:column;justify-content:center;background:#0f0f0f}
.noir .h-eyebrow{font-size:.68rem;letter-spacing:5px;text-transform:uppercase;color:#555;margin-bottom:20px}
.noir .h-name{font-family:'Fraunces',serif;font-size:clamp(2.5rem,5vw,5rem);font-weight:700;line-height:.95;letter-spacing:-2px;margin-bottom:16px}
.noir .h-title{color:#555;font-size:.9rem;font-weight:300;letter-spacing:2px;text-transform:uppercase}
.noir .h-summary{color:#777;line-height:1.8;font-size:.95rem;margin-bottom:16px}
.noir .h-contact{color:#444;font-size:.8rem;font-family:'IBM Plex Mono',monospace;line-height:1.8}
.noir .sec-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:#444;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid #1a1a1a}
.noir .card{padding:20px 0;border-bottom:1px solid #111}
.noir .c-title{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;margin-bottom:4px}
.noir .c-sub{color:#555;font-size:.8rem;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.noir .c-desc{color:#666;font-size:.88rem;white-space:pre-line;line-height:1.7}
.noir .tag{background:#111;color:#555;border:1px solid #1d1d1d;padding:4px 12px;border-radius:2px;font-size:.75rem;font-family:'IBM Plex Mono',monospace;display:inline-block;margin:3px}
.noir .float-icon{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1)}

/* ════════════════════════════════════════════════════════════════════
   THEME 3 — MIDNIGHT
════════════════════════════════════════════════════════════════════ */
body.midnight{background:#0a0a1a;color:#e8dcc8;font-family:'Playfair Display',serif}
.midnight .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:80px;background:linear-gradient(160deg,#0a0a1a,#0d0d2b);border-bottom:1px solid rgba(201,168,76,0.2)}
.midnight .h-accent{width:50px;height:3px;background:linear-gradient(90deg,#c9a84c,#e8c97a);border-radius:2px;margin-bottom:20px}
.midnight .h-name{font-size:clamp(3rem,8vw,7rem);font-weight:700;line-height:.9;letter-spacing:-2px;color:#e8dcc8;margin-bottom:14px}
.midnight .h-title{font-family:'IBM Plex Mono',monospace;font-size:.75rem;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;margin-bottom:16px}
.midnight .h-summary{font-style:italic;font-size:1.05rem;color:#a09880;max-width:520px;line-height:1.7}
.midnight .h-contact{margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#7a6850}
.midnight .sec-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:#c9a84c;margin-bottom:22px;border-top:1px solid rgba(201,168,76,0.2);border-bottom:1px solid rgba(201,168,76,0.2);padding:6px 0;text-align:center}
.midnight .card{padding:18px 0;border-bottom:1px solid rgba(201,168,76,0.08)}
.midnight .c-title{font-size:1.1rem;font-weight:700;margin-bottom:4px;color:#e8dcc8}
.midnight .c-sub{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#c9a84c;margin-bottom:6px}
.midnight .c-desc{font-style:italic;color:#a09880;font-size:.9rem;white-space:pre-line;line-height:1.6}
.midnight .tag{background:rgba(201,168,76,.1);color:#c9a84c;border:1px solid rgba(201,168,76,.25);padding:4px 10px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;display:inline-block;margin:3px}
.midnight .float-icon{background:rgba(201,168,76,0.1);border-color:rgba(201,168,76,0.25)}

/* ════════════════════════════════════════════════════════════════════
   THEME 4 — OBSIDIAN
════════════════════════════════════════════════════════════════════ */
body.obsidian{background:#141414;color:#e0e0e0;font-family:'Unbounded',sans-serif}
.obsidian .hero{min-height:100vh;background:#0f0f0f;display:flex;flex-direction:column;overflow:hidden}
.obsidian .hero-top{background:#111;padding:60px 80px 40px;border-bottom:3px solid #ff6b35;flex:1;display:flex;flex-direction:column;justify-content:flex-end}
.obsidian .h-name{font-size:clamp(2.5rem,6vw,5.5rem);font-weight:900;color:#fff;line-height:.9;letter-spacing:-3px;margin-bottom:10px;text-transform:uppercase}
.obsidian .h-title{font-size:.75rem;color:#ff6b35;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
.obsidian .h-summary{font-family:'DM Sans',sans-serif;color:#888;max-width:540px;line-height:1.7;font-size:.9rem}
.obsidian .h-contact{margin-top:12px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:#555}
.obsidian .sec-label{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#ff6b35;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.obsidian .sec-label::before{content:'';width:20px;height:2px;background:#ff6b35}
.obsidian .card{background:#1a1a1a;border-left:3px solid #ff6b35;padding:16px 20px;margin-bottom:10px;border-radius:0 8px 8px 0;transition:all .2s}
.obsidian .card:hover{background:#1f1f1f;border-left-width:4px}
.obsidian .c-title{font-size:.9rem;font-weight:700;color:#fff;margin-bottom:4px}
.obsidian .c-sub{font-family:'DM Sans',sans-serif;font-size:.8rem;color:#ff6b35;margin-bottom:6px}
.obsidian .c-desc{font-family:'DM Sans',sans-serif;color:#888;font-size:.85rem;white-space:pre-line;line-height:1.6}
.obsidian .tag{background:rgba(255,107,53,.1);color:#ff6b35;border:1px solid rgba(255,107,53,.25);padding:4px 12px;border-radius:3px;font-size:.72rem;display:inline-block;margin:3px;font-family:'DM Sans',sans-serif}
.obsidian .float-icon{background:rgba(255,107,53,0.1);border-color:rgba(255,107,53,0.25)}

/* ════════════════════════════════════════════════════════════════════
   THEME 5 — STEEL (dark silver industrial)
════════════════════════════════════════════════════════════════════ */
body.steel{background:#111416;color:#c8d0d8;font-family:'DM Sans',sans-serif}
.steel .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:80px;background:linear-gradient(160deg,#0d0f11,#161b20);position:relative;overflow:hidden}
.steel .hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#dc2626,#ef4444,#dc2626)}
.steel .hero::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.01) 60px,rgba(255,255,255,.01) 61px);pointer-events:none}
.steel .h-tag{display:inline-block;background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#ef4444;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:2px;margin-bottom:16px;font-family:'IBM Plex Mono',monospace}
.steel .h-name{font-family:'Unbounded',sans-serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:900;color:#e8ecf0;letter-spacing:-3px;line-height:.88;margin-bottom:12px;text-transform:uppercase}
.steel .h-title{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#dc2626;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.steel .h-summary{color:rgba(200,208,216,.5);line-height:1.7;max-width:520px;font-size:.9rem}
.steel .h-contact{margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:rgba(200,208,216,.3)}
.steel .sec-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:#dc2626;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.steel .sec-label::before{content:'//';color:rgba(220,38,38,.5)}
.steel .sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(220,38,38,.3),transparent)}
.steel .card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-left:2px solid #dc2626;padding:16px 20px;margin-bottom:8px;border-radius:0 4px 4px 0;transition:all .2s}
.steel .card:hover{background:rgba(255,255,255,.04);border-left-color:#ef4444}
.steel .c-title{font-weight:700;color:#e8ecf0;margin-bottom:4px;font-size:.95rem}
.steel .c-sub{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#dc2626;margin-bottom:6px}
.steel .c-desc{color:rgba(200,208,216,.45);font-size:.85rem;white-space:pre-line;line-height:1.6}
.steel .tag{background:rgba(255,255,255,.05);color:#9ca3af;border:1px solid rgba(255,255,255,.08);padding:4px 10px;border-radius:2px;font-family:'IBM Plex Mono',monospace;font-size:.7rem;display:inline-block;margin:3px}
.steel .float-icon{background:rgba(220,38,38,0.1);border-color:rgba(220,38,38,0.3)}

/* ════════════════════════════════════════════════════════════════════
   THEME 6 — LINEN
════════════════════════════════════════════════════════════════════ */
body.linen{background:#f4ede0;color:#1c1208;font-family:'Cormorant Garamond',serif}
.linen .hero{min-height:88vh;display:flex;align-items:flex-end;padding:70px 80px;background:linear-gradient(180deg,#f4ede0,#eee3d0);border-bottom:2px solid #1c1208;position:relative;overflow:hidden}
.linen .hero::after{content:'';position:absolute;right:0;top:0;bottom:0;width:35%;background:repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(180,140,80,.05) 8px,rgba(180,140,80,.05) 9px)}
.linen .h-name{font-size:clamp(3.5rem,9vw,8rem);font-weight:700;line-height:.88;letter-spacing:-3px;margin-bottom:14px}
.linen .h-title{font-family:'IBM Plex Mono',monospace;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:#b5956a;margin-bottom:16px}
.linen .h-summary{font-style:italic;font-size:1.1rem;color:#5a4030;max-width:480px;line-height:1.6}
.linen .h-contact{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#8a7060}
.linen .sec-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:4px;text-transform:uppercase;color:#b5956a;margin-bottom:22px}
.linen .card{padding:18px 0;border-top:1px solid rgba(28,18,8,.1)}
.linen .c-title{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.linen .c-sub{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:#b5956a;margin-bottom:6px}

          ${t.icons.map(ic=>`<span class="tr-prev-icon">${ic}</span>`).join('')}
        </div>
      </div>
      <div class="tr-meta">
        <div>
          <div class="tr-name">${t.name}</div>
          <div class="tr-cat">${t.cat}</div>
        </div>
        <button class="tr-select" onclick="event.stopPropagation();applyTheme('${t.id}')">
          ${t.id === theme ? '✓ Active' : 'Select'}
        </button>
      </div>
    </div>
  `).join('');
}

// ── APPLY THEME ────────────────────────────────────────────────────
function applyTheme(t) {
  if (t === theme) return;
  const overlay = document.getElementById('theme-transition');
  overlay.classList.add('flash');
  setTimeout(() => {
    theme = t;
    document.body.className = t;
    renderPortfolio();
    // Update panel
    document.querySelectorAll('.tr').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tr-select').forEach(btn => btn.textContent = 'Select');
    const active = document.getElementById('tr-' + t);
    if (active) {
      active.classList.add('active');
      active.querySelector('.tr-select').textContent = '✓ Active';
      active.scrollIntoView({behavior:'smooth', block:'nearest'});
    }
    overlay.classList.remove('flash');
    setupScrollAnimations();
  }, 250);
}

function socialHtml(d) {
  const links = [];
  if (d.linkedin)  links.push(`<a class="s-btn li" href="https://${d.linkedin.replace(/^https?:\/\//,'')}" target="_blank">💼 LinkedIn</a>`);
  if (d.github)    links.push(`<a class="s-btn gh" href="https://${d.github.replace(/^https?:\/\//,'')}" target="_blank">🐙 GitHub</a>`);
  if (d.instagram) links.push(`<a class="s-btn ig" href="https://instagram.com/${d.instagram.replace(/.*instagram\.com\//,'').replace('@','')}" target="_blank">📸 Instagram</a>`);
  if (d.whatsapp)  links.push(`<a class="s-btn wa" href="https://wa.me/${d.whatsapp.replace(/\D/g,'')}" target="_blank">💬 WhatsApp</a>`);
  return links.length ? `<div class="s-links">${links.join('')}</div>` : '';
}

// ── SECTION HTML ───────────────────────────────────────────────────
function sectionHtml(icon, label, content) {
  if (!content) return '';
  return `
    <div class="section-wrap">
      <div class="float-icon">${icon}</div>
      <div class="section fade-up">
        <div class="sec-label">${label}</div>
        ${content}
      </div>
    </div>`;
}

function cardHtml(title, sub, desc) {
  return `<div class="card fade-up">
    <div class="c-title">${title}</div>
    ${sub ? `<div class="c-sub">${sub}</div>` : ''}
    ${desc ? `<div class="c-desc">${desc}</div>` : ''}
  </div>`;
}

function tagsHtml(skills) {
  if (!skills || !skills.length) return '';
  const chalkColors = ['#ede9fe;color:#7c3aed','#fef3c7;color:#d97706','#d1fae5;color:#065f46','#fce7f3;color:#9d174d','#dbeafe;color:#1e40af'];
  return `<div style="display:flex;flex-wrap:wrap;gap:6px">${skills.map((s,i)=>{
    if (theme==='chalk') return `<span class="tag" style="background:${chalkColors[i%chalkColors.length].split(';')[0].replace('background:','')};${chalkColors[i%chalkColors.length]}">${s}</span>`;
    return `<span class="tag">${s}</span>`;
  }).join('')}</div>`;
}

// ── RENDER PORTFOLIO ───────────────────────────────────────────────
function renderPortfolio() {
  document.body.className = theme;
  document.title = (D.name || 'Portfolio') + ' — Folio';
  document.getElementById('page-title') && (document.getElementById('page-title').textContent = document.title);

  const expHtml     = (D.exps||[]).filter(e=>e.title).map(e=>cardHtml(e.title+(e.company?` — ${e.company}`:''), [e.start,e.end].filter(Boolean).join(' – '), e.desc)).join('');
  const eduHtml     = (D.edus||[]).filter(e=>e.degree).map(e=>cardHtml(e.degree, [e.school, e.year, e.grade].filter(Boolean).join(' · '), '')).join('');
  const projHtml    = (D.projs||[]).filter(p=>p.name).map(p=>cardHtml(p.name+(p.url?` <span style="opacity:.5;font-size:.8em">${p.url}</span>`:''), '', p.desc)).join('');
  const certHtml    = (D.certs||[]).filter(c=>c.name).map(c=>cardHtml(c.name, [c.issuer, c.year].filter(Boolean).join(' · '), '')).join('');
  const achieveHtml = (D.achievements||[]).filter(a=>a.title).map(a=>cardHtml(a.title, '', a.desc)).join('');
  const langHtml    = (D.langs||[]).filter(l=>l.name).length
    ? `<div style="display:flex;flex-wrap:wrap;gap:8px">${(D.langs||[]).filter(l=>l.name).map(l=>`<span class="tag">${l.name} <span style="opacity:0.55;font-size:0.85em">· ${l.level}</span></span>`).join('')}</div>`
    : '';

  document.getElementById('portfolio-content').innerHTML =
    heroHtml(D) +
    sectionHtml(getIcon('exp'),     'Experience',      expHtml) +
    sectionHtml(getIcon('edu'),     'Education',       eduHtml) +
    sectionHtml(getIcon('proj'),    'Projects',        projHtml) +
    sectionHtml(getIcon('cert'),    'Certifications',  certHtml) +
    sectionHtml(getIcon('achieve'), 'Achievements',    achieveHtml) +
    sectionHtml(getIcon('skills'),  'Skills',          tagsHtml(D.skills)) +
    sectionHtml(getIcon('lang'),    'Languages',       langHtml);
}

// ── SCROLL ANIMATIONS ──────────────────────────────────────────────
function setupScrollAnimations() {
  const pv = document.getElementById('portfolio-view');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1, root: pv });

  document.querySelectorAll('.fade-up, .section-wrap').forEach(el => {
    el.classList.remove('visible');
    observer.observe(el);
  });

  // Trigger hero immediately
  setTimeout(() => {
    document.querySelectorAll('.hero .fade-up, .hero').forEach(el => el.classList.add('visible'));
  }, 100);
}

// ── TOAST ──────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── SHARE ──────────────────────────────────────────────────────────
function copyLink() {
  const url = location.origin + '/portfolio.html?theme=' + theme;
  navigator.clipboard.writeText(url).then(() => toast('🔗 Portfolio link copied!'));
}

// ── SAVE PDF ───────────────────────────────────────────────────────
function savePDF() {
  toast('📄 Opening print dialog...');
  setTimeout(() => window.print(), 500);
}

buildThemePanel();
renderPortfolio();
setTimeout(setupScrollAnimations, 200);
